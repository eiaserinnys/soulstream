[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "soul-common"
version = "0.1.0"
description = "Shared modules for soulstream services (DB, catalog, auth, models)"
requires-python = ">=3.11"
dependencies = [
    "asyncpg>=0.29.0",
    "fastapi>=0.115.0",
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "PyJWT>=2.8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-timeout>=2.2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/soul_common"]
