name: Test Windows Installer

on:
  push:
    branches: [main]
    paths:
      - 'install/**'
      - '.github/workflows/test-install.yml'
  workflow_dispatch:

jobs:
  test-install:
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Run installer (non-interactive)
        shell: pwsh
        run: |
          .\install\install.ps1 `
            -NonInteractive `
            -Force `
            -InstallDir "C:\soulstream-test" `
            -WorkspaceDir "C:\workspace-test" `
            -Port 3105

      - name: Verify service health
        shell: pwsh
        run: |
          $maxRetry = 10
          $attempt = 0
          $ok = $false
          while ($attempt -lt $maxRetry) {
            try {
              $res = Invoke-RestMethod "http://localhost:3105/api/health" -TimeoutSec 3
              Write-Host "Health check OK: $($res | ConvertTo-Json -Compress)"
              $ok = $true
              break
            } catch {
              Write-Host "Attempt $($attempt+1)/$maxRetry failed: $_"
              Start-Sleep -Seconds 3
              $attempt++
            }
          }
          if (-not $ok) {
            Write-Error "Service did not respond after $maxRetry attempts"
            exit 1
          }

      - name: Smoke test — folder, session, SQLite
        shell: pwsh
        run: |
          $env:PYTHONUTF8 = "1"
          $base = "http://localhost:3105"

          # 1. Create a folder
          $folder = Invoke-RestMethod "$base/api/catalog/folders" `
            -Method POST -ContentType "application/json" `
            -Body '{"name": "ci-smoke-test", "sort_order": 0}'
          Write-Host "Folder created: id=$($folder.id) name=$($folder.name)"

          # 2. Create a session in that folder (use_mcp=false skips MCP server setup)
          $body = [ordered]@{
            prompt   = "Print: CI_TEST_OK"
            folderId = $folder.id
            use_mcp  = $false
          } | ConvertTo-Json
          $session = Invoke-RestMethod "$base/api/sessions" `
            -Method POST -ContentType "application/json" -Body $body
          Write-Host "Session created: agentSessionId=$($session.agentSessionId) status=$($session.status)"

          # 3. Wait briefly for the DB INSERT to complete
          Start-Sleep -Seconds 2

          # 4. Verify SQLite — soul-server cwd is the install dir, data_dir defaults to {cwd}/.local/data
          $dbPath = "C:\soulstream-test\soulstream\soul-server\.local\data\soulstream.db"
          if (-not (Test-Path $dbPath)) {
            Write-Error "SQLite DB not found: $dbPath"
            exit 1
          }
          Write-Host "SQLite DB found: $dbPath"

          $folderId  = $folder.id
          $sessionId = $session.agentSessionId
          $py = @"
import sqlite3, sys
db = sqlite3.connect(r'$dbPath')
cur = db.cursor()

cur.execute("SELECT id, name FROM folders WHERE id=?", ('$folderId',))
frow = cur.fetchone()
if not frow:
    print("FAIL: folder not in DB", file=sys.stderr)
    sys.exit(1)
print(f"  folder  OK : id={frow[0]}  name={frow[1]}")

cur.execute("SELECT session_id, status, folder_id FROM sessions WHERE session_id=?", ('$sessionId',))
srow = cur.fetchone()
if not srow:
    print("FAIL: session not in DB", file=sys.stderr)
    sys.exit(1)
print(f"  session OK : id={srow[0]}  status={srow[1]}  folder_id={srow[2]}")
db.close()
"@
          python -c $py
          if ($LASTEXITCODE -ne 0) {
            Write-Error "SQLite verification failed"
            exit 1
          }
          Write-Host "Smoke tests passed"

      - name: Dump service logs on failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== haniel-run.log ==="
          if (Test-Path "C:\soulstream-test\logs\haniel-run.log") {
            Get-Content "C:\soulstream-test\logs\haniel-run.log" -Tail 60
          } else { Write-Host "(not found)" }
          Write-Host "=== haniel-run.log.err ==="
          if (Test-Path "C:\soulstream-test\logs\haniel-run.log.err") {
            Get-Content "C:\soulstream-test\logs\haniel-run.log.err" -Tail 30
          } else { Write-Host "(not found)" }
          Write-Host "=== .env ==="
          if (Test-Path "C:\soulstream-test\soulstream\soul-server\.env") {
            Get-Content "C:\soulstream-test\soulstream\soul-server\.env"
          } else { Write-Host "(not found)" }
          Write-Host "=== Processes ==="
          Get-Process | Where-Object { $_.ProcessName -match "python|haniel" } | Format-Table Name, Id, CPU

      - name: Print service info
        shell: pwsh
        run: |
          Write-Host "=== Installation Summary ==="
          Write-Host "Install dir : C:\soulstream-test"
          Write-Host "Workspace   : C:\workspace-test"
          Write-Host "Port        : 3105"
          try {
            $info = Invoke-RestMethod "http://localhost:3105/api/health"
            Write-Host "Service     : UP"
          } catch {
            Write-Host "Service     : DOWN (health check failed)"
          }
          Write-Host "Dashboard   : C:\soulstream-test\soulstream\unified-dashboard\dist"
          if (Test-Path "C:\soulstream-test\soulstream\unified-dashboard\dist\index.html") {
            Write-Host "Dashboard build: OK"
          } else {
            Write-Host "Dashboard build: MISSING"
          }
