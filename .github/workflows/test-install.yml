name: Test Windows Installer

on:
  push:
    branches: [main]
    paths:
      - 'install/**'
      - '.github/workflows/test-install.yml'
  pull_request:
    paths:
      - 'install/**'
      - 'packages/db-schema/**'
      - 'soul-server-ts/scripts/**'
      - 'soul-server-ts/tests/scripts/**'
      - 'deploy/release-manifest.json'
      - 'deploy/tests/**'
      - '.github/workflows/test-install.yml'
  workflow_dispatch:

jobs:
  test-install:
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      PGUSER: soulstream_schema_test
      PGPASSWORD: soulstream_schema_secret
      PGDATABASE: soulstream_schema_test
      PGPORT: '54329'
      SOULSTREAM_SOURCE_URL: ${{ github.event.pull_request.head.repo.clone_url || format('{0}/{1}.git', github.server_url, github.repository) }}
      SOULSTREAM_SOURCE_BRANCH: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install paired Haniel release contract
        shell: pwsh
        run: |
          python -m pip install --force-reinstall `
            git+https://github.com/eiaserinnys/Haniel.git@c19c06f201b02f3394b6cdec8392c5398803f4bf

      - name: Setup Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Expose PostgreSQL 16+ client tools
        shell: pwsh
        run: |
          $candidate = Get-ChildItem "C:\Program Files\PostgreSQL" -Directory -ErrorAction SilentlyContinue |
            Where-Object { [int]$_.Name -ge 16 } |
            Sort-Object { [int]$_.Name } -Descending |
            Select-Object -First 1
          if ($null -eq $candidate) {
            choco install postgresql16 --yes --no-progress
            $candidate = Get-Item "C:\Program Files\PostgreSQL\16"
          }
          $bin = Join-Path $candidate.FullName "bin"
          if (-not (Test-Path (Join-Path $bin "pg_dump.exe")) -or
              -not (Test-Path (Join-Path $bin "pg_restore.exe"))) {
            throw "PostgreSQL client tools were not installed at $bin"
          }
          $bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Start PostgreSQL
        shell: pwsh
        run: |
          $dataDir = Join-Path $env:RUNNER_TEMP "soulstream-test-pg"
          $passwordFile = Join-Path $env:RUNNER_TEMP "soulstream-test-pg-password"
          $logFile = Join-Path $env:RUNNER_TEMP "soulstream-test-pg.log"
          $env:PGDATA = $dataDir
          $env:PGHOST = "127.0.0.1"
          $env:PGPASSWORD | Set-Content -Path $passwordFile -NoNewline -Encoding utf8
          initdb -D $dataDir -U $env:PGUSER --pwfile=$passwordFile `
            --auth-host=scram-sha-256 --encoding=UTF8
          Remove-Item $passwordFile -Force
          pg_ctl -D $dataDir -l $logFile -o "-p $env:PGPORT -h 127.0.0.1" start

          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            pg_isready -h 127.0.0.1 -p $env:PGPORT -U $env:PGUSER -d postgres
            if ($LASTEXITCODE -eq 0) {
              $ready = $true
              break
            }
            Start-Sleep -Seconds 2
          }
          if (-not $ready) {
            Write-Error "PostgreSQL did not become ready"
            exit 1
          }
          createdb -h 127.0.0.1 -p $env:PGPORT -U $env:PGUSER $env:PGDATABASE

      - name: Run installer (non-interactive)
        shell: pwsh
        run: |
          $dbUrl = "postgresql://{0}:{1}@127.0.0.1:{2}/{3}" -f $env:PGUSER, $env:PGPASSWORD, $env:PGPORT, $env:PGDATABASE
          .\install\install.ps1 `
            -NonInteractive `
            -Force `
            -InstallDir "C:\soulstream-test" `
            -WorkspaceDir "C:\workspace-test" `
            -Port 3105 `
            -DatabaseUrl $dbUrl `
            -AuthBearerToken "ci-test-token" `
            -RepositoryUrl $env:SOULSTREAM_SOURCE_URL `
            -RepositoryBranch $env:SOULSTREAM_SOURCE_BRANCH

      - name: Verify actual release manifest recovery contract
        shell: pwsh
        run: |
          python -m unittest discover `
            -s deploy/tests `
            -p "test_haniel_release_contract.py" `
            -v

      - name: Verify service health
        shell: pwsh
        run: |
          $maxRetry = 10
          $attempt = 0
          $ok = $false
          while ($attempt -lt $maxRetry) {
            try {
              $res = Invoke-RestMethod "http://localhost:3105/health" -TimeoutSec 3
              Write-Host "Health check OK: $($res | ConvertTo-Json -Compress)"
              if ($res.service -ne "soul-server-ts") {
                Write-Error "Unexpected service: $($res.service)"
                exit 1
              }
              $ok = $true
              break
            } catch {
              Write-Host "Attempt $($attempt+1)/$maxRetry failed: $_"
              Start-Sleep -Seconds 3
              $attempt++
            }
          }
          if (-not $ok) {
            Write-Error "Service did not respond after $maxRetry attempts"
            exit 1
          }

      - name: Smoke test — PostgreSQL schema
        shell: pwsh
        run: |
          $sessionsTable = psql `
            -h 127.0.0.1 `
            -p $env:PGPORT `
            -U $env:PGUSER `
            -d $env:PGDATABASE `
            -tAc "SELECT to_regclass('public.sessions')"
          if ($sessionsTable.Trim() -ne "sessions") {
            Write-Error "sessions table was not created"
            exit 1
          }

          $sessionGet = psql `
            -h 127.0.0.1 `
            -p $env:PGPORT `
            -U $env:PGUSER `
            -d $env:PGDATABASE `
            -tAc "SELECT to_regprocedure('public.session_get(text)')"
          if ($sessionGet.Trim() -ne "session_get(text)") {
            Write-Error "session_get(text) procedure was not created"
            exit 1
          }
          Write-Host "PostgreSQL schema smoke test passed"

      - name: Dump service logs on failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== haniel-run.log ==="
          if (Test-Path "C:\soulstream-test\logs\haniel-run.log") {
            Get-Content "C:\soulstream-test\logs\haniel-run.log" -Tail 60
          } else { Write-Host "(not found)" }
          Write-Host "=== haniel-run.log.err ==="
          if (Test-Path "C:\soulstream-test\logs\haniel-run.log.err") {
            Get-Content "C:\soulstream-test\logs\haniel-run.log.err" -Tail 30
          } else { Write-Host "(not found)" }
          Write-Host "=== .env.soul-server-ts ==="
          if (Test-Path "C:\soulstream-test\soulstream\.env.soul-server-ts") {
            Get-Content "C:\soulstream-test\soulstream\.env.soul-server-ts"
          } else { Write-Host "(not found)" }
          Write-Host "=== Processes ==="
          Get-Process | Where-Object { $_.ProcessName -match "node|haniel" } | Format-Table Name, Id, CPU

      - name: Print service info
        shell: pwsh
        run: |
          Write-Host "=== Installation Summary ==="
          Write-Host "Install dir : C:\soulstream-test"
          Write-Host "Workspace   : C:\workspace-test"
          Write-Host "Port        : 3105"
          try {
            $info = Invoke-RestMethod "http://localhost:3105/health"
            Write-Host "Service     : UP"
          } catch {
            Write-Host "Service     : DOWN (health check failed)"
          }
          Write-Host "Dashboard   : C:\soulstream-test\soulstream\unified-dashboard\dist"
          if (Test-Path "C:\soulstream-test\soulstream\unified-dashboard\dist\index.html") {
            Write-Host "Dashboard build: OK"
          } else {
            Write-Host "Dashboard build: MISSING"
          }

      - name: Stop PostgreSQL
        if: always()
        shell: pwsh
        run: |
          $dataDir = Join-Path $env:RUNNER_TEMP "soulstream-test-pg"
          if (Test-Path $dataDir) {
            pg_ctl -D $dataDir stop -m fast
          }
