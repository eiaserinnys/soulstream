name: wire-schema verify

# packages/wire-schema/src/upstream.schema.json 변경 시
# generated/ 산출물이 schema와 동기 상태인지 검증한다.
# 정본 룰: packages/wire-schema/scripts/verify.sh

on:
  push:
    branches: [main]
    paths:
      - 'packages/wire-schema/**'
      - '.github/workflows/wire-schema.yml'
  pull_request:
    paths:
      - 'packages/wire-schema/**'
      - '.github/workflows/wire-schema.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python codegen + test deps
        run: pip install 'datamodel-code-generator>=0.25.0' 'jsonschema>=4.20.0' 'pytest>=8.0.0'

      - name: Verify schema ↔ generated 정합
        run: bash packages/wire-schema/scripts/verify.sh

      - name: Run schema validity tests
        run: pytest packages/wire-schema/tests/ -v --timeout=60
