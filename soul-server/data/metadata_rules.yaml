# 세션 메타데이터 추출 규칙 (범용 기본값)
# tool_result 이벤트의 tool_name + result를 매칭하여 메타데이터를 추출한다.
#
# 규칙 순서가 우선순위를 결정한다 (first-match-wins).
# 같은 tool_name에 대한 여러 규칙이 있으면, 더 구체적인 규칙을 위에 배치해야 한다.
#
# 이 파일은 Claude Code 세션에서 보편적으로 발생하는 이벤트만 포함한다.
# 워크스페이스 특화 규칙(Trello, Serendipity, Arbor 등)은
# 배포 환경에서 DATA_DIR에 metadata_rules.yaml을 별도로 배치하여 사용한다.
# DATA_DIR에 파일이 있으면 이 기본 파일 대신 해당 파일을 로드한다.
#
# 필드 설명:
#   tool_name: 도구 이름 (정확히 일치 또는 정규식)
#   tool_name_regex: true면 tool_name을 정규식으로 취급 (기본: false)
#   result_mode: "regex" | "json" (result를 정규식으로 매칭할지 JSON 파싱할지)
#   result_pattern: 정규식 패턴 (result_mode: regex일 때)
#   extract: 추출할 필드 매핑
#     type: 메타데이터 타입 (고정 문자열)
#     value: 추출 값 ($1, $2 = 정규식 캡처 그룹 / $.path = JSON path)
#     label: 선택, 표시 라벨
#     url: 선택, 관련 URL

rules:
  # git commit 출력: [branch-name hash] message
  # 예: [fix/metadata 1a2b3c4] feat: add extraction
  # detached HEAD: [1a2b3c4] feat: add extraction
  - name: git_commit
    tool_name: Bash
    result_mode: regex
    result_pattern: "\\[[^\\]]*?\\b([a-f0-9]{7,12})\\]\\s+(.+)"
    extract:
      type: git_commit
      value: "$1"
      label: "$2"

  - name: git_branch_create
    tool_name: Bash
    result_mode: regex
    result_pattern: "Switched to a new branch '([^']+)'"
    extract:
      type: git_branch_create
      value: "$1"

  - name: git_worktree_add
    tool_name: Bash
    result_mode: regex
    result_pattern: "Preparing worktree \\(new branch '([^']+)'\\)"
    extract:
      type: git_worktree_create
      value: "$1"

  # git push 출력: abc1234..def5678  branch -> branch
  - name: git_push
    tool_name: Bash
    result_mode: regex
    result_pattern: "([a-f0-9]{7,12})\\.\\.([a-f0-9]{7,12})\\s+(\\S+)\\s+->\\s+(\\S+)"
    extract:
      type: git_push
      value: "$3"
      label: "$1..$2"

  - name: git_branch_delete
    tool_name: Bash
    result_mode: regex
    result_pattern: "Deleted branch ([^ ]+)"
    extract:
      type: git_branch_delete
      value: "$1"

  # git worktree remove는 성공 시 출력이 없을 수 있다.
  # stderr의 "Removing worktree" 메시지가 result에 포함되면 매칭.
  # 빈 출력이면 매칭 실패 → 메타데이터 미기록 (허용 가능한 누락)
  - name: git_worktree_remove
    tool_name: Bash
    result_mode: regex
    result_pattern: "(?:Removing worktree|worktree .+ removed)"
    extract:
      type: git_worktree_remove
      value: "worktree removed"

  # 세렌디피티 배치 도구: batch_operations, batch_create_blocks, batch_sync_blocks
  # 배치 결과에서 첫 번째 title 또는 pageId를 추출
  - name: serendipity_batch
    tool_name: "mcp__serendipity__batch_"
    tool_name_regex: true
    result_mode: regex
    result_pattern: "\"title\":\\s*\"([^\"]+)\""
    extract:
      type: serendipity_batch
      value: "$1"

  # 실제 result: "File created successfully at: {path}"
  - name: file_write
    tool_name: Write
    result_mode: regex
    result_pattern: "File created successfully at:\\s*(.+)"
    extract:
      type: file_write
      value: "$1"

  # 실제 result: "The file {path} has been updated successfully."
  - name: file_edit
    tool_name: Edit
    result_mode: regex
    result_pattern: "The file (.+) has been updated"
    extract:
      type: file_edit
      value: "$1"
